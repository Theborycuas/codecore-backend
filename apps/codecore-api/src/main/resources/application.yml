spring:
  application:
    name: codecore-api

  profiles:
    # Override with SPRING_PROFILES_ACTIVE (e.g. from .env). Gradle bootRun loads codecore-backend/.env.
    active: ${SPRING_PROFILES_ACTIVE:dev}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}

security:
  jwt:
    issuer: ${JWT_ISSUER:codecore-api}
    expiration: ${JWT_EXPIRATION:900s}
