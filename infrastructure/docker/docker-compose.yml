services:

  postgres:

    image: postgres:16-alpine

    container_name: codecore-postgres

    restart: unless-stopped

    env_file:
      - ../../.env

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-db_codecore}
      POSTGRES_USER: ${POSTGRES_USER:-codecore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT:-5433}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - codecore-network

  redis:

    image: redis:7-alpine

    container_name: codecore-redis

    restart: unless-stopped

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      - redis_data:/data

    networks:
      - codecore-network

volumes:
  postgres_data:
  redis_data:

networks:
  codecore-network:
